[tool:pytest]
# Pytest configuration for browser-agent project

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Add options
addopts = 
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --maxfail=10
    --durations=10

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may require external services)
    security: Security-focused tests
    performance: Performance and benchmark tests
    slow: Slow tests (may take several minutes)
    
    # Component-specific markers
    model_router: Tests for model routing functionality
    workflows: Tests for workflow execution
    security_manager: Tests for security management
    credentials: Tests for credential management
    domain_validation: Tests for domain validation
    audit_logging: Tests for audit logging
    
    # Environment markers
    requires_browser: Tests that require browser automation
    requires_network: Tests that require network access
    requires_ollama: Tests that require Ollama to be running
    requires_api_keys: Tests that require real API keys

# Test timeout (in seconds)
timeout = 300

# Coverage configuration
[coverage:run]
source = .
omit = 
    tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*
    setup.py
    run_tests.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2

[coverage:html]
directory = htmlcov